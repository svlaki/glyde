services:
  # Node.js Agents Service
  agent:
    build:
      context: ./apps/agents
      dockerfile: Dockerfile
    container_name: glydeeee-agents
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ZEP_API_KEY=${ZEP_API_KEY}
      - ZEP_BASE_URL=${ZEP_BASE_URL}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI}
      - GOOGLE_CONNECTION_CALLBACK_URI=${GOOGLE_CONNECTION_CALLBACK_URI:-${GOOGLE_REDIRECT_URI}}
      - MICROSOFT_CLIENT_ID=${MICROSOFT_CLIENT_ID}
      - MICROSOFT_CLIENT_SECRET=${MICROSOFT_CLIENT_SECRET}
      - MICROSOFT_REDIRECT_URI=${MICROSOFT_REDIRECT_URI:-${GOOGLE_CONNECTION_CALLBACK_URI:-${GOOGLE_REDIRECT_URI}}}
      - API_BASE_URL=${API_BASE_URL}
      - ADMIN_USER_IDS=${VITE_ADMIN_USER_IDS}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_CONTACT_EMAIL=${VAPID_CONTACT_EMAIL}
      - APNS_KEY_ID=${APNS_KEY_ID}
      - APNS_TEAM_ID=${APNS_TEAM_ID}
      - APNS_KEY_CONTENT=${APNS_KEY_CONTENT}
      - APNS_PRODUCTION=${APNS_PRODUCTION:-false}
    # healthcheck:
    #   test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 30s

  # Frontend (React/Vite)
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    container_name: glydeeee-frontend
    ports:
      - "3000:5173"
    volumes:
      - ./apps/frontend/src:/app/src
      - ./apps/frontend/public:/app/public
      - ./apps/frontend/index.html:/app/index.html
      - ./apps/frontend/main.tsx:/app/main.tsx
      - ./apps/frontend/vite.config.ts:/app/vite.config.ts
      - ./apps/frontend/tailwind.config.js:/app/tailwind.config.js
      - ./apps/frontend/postcss.config.js:/app/postcss.config.js
    environment:
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - VITE_AGENT_SERVICE_URL=http://localhost:8000
      - VITE_ADMIN_USER_IDS=${VITE_ADMIN_USER_IDS}
      - VITE_VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
    depends_on:
      agent:
        condition: service_started

volumes:
  db_data:

networks:
  default:
    driver: bridge