<!DOCTYPE html>
<html>
<head>
    <title>Clear Daily Briefing Cache</title>
</head>
<body>
    <h1>Clear Daily Briefing Cache</h1>
    <button onclick="clearCache()">Clear Cache and Reload</button>
    <script>
        function clearCache() {
            localStorage.removeItem('lastDailyBriefing');
            alert('Daily briefing cache cleared! The app will show a new briefing on next load.');
            window.location.href = 'http://localhost:5174/';
        }
    </script>
</body>
</html>
