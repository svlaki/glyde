server {
    listen 80;
    server_name localhost;

    # Root directory for the React build output
    root /usr/share/nginx/html;
    index index.html;

    location / {
        # Try to serve the requested file, but if it doesn't exist,
        # fall back to serving index.html. This is crucial for
        # single-page applications like React Router.
        try_files $uri /index.html;
    }

    # Optional: Add headers to prevent caching issues
    location ~* \.(?:html|json)$ {
        expires -1;
    }

    # Optional: Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
